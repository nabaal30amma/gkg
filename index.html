<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Penggilingan Padi</title>
    
    <!-- Memuat Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuat React dan ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Memuat Babel untuk menerjemahkan JSX di browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <!-- Kontainer utama React -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Komponen Ikon (Menggantikan lucide-react agar bisa berjalan standalone) ---
        const IconCalculator = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="20" x="4" y="2" rx="2"/><line x1="8" x2="16" y1="6" y2="6"/><line x1="16" x2="16.01" y1="10" y2="10"/><line x1="12" x2="12.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="10" y2="10"/><line x1="8" x2="8.01" y1="14" y2="14"/><line x1="12" x2="12.01" y1="14" y2="14"/><line x1="16" x2="16.01" y1="14" y2="14"/><line x1="8" x2="8.01" y1="18" y2="18"/><line x1="12" x2="12.01" y1="18" y2="18"/><line x1="16" x2="16.01" y1="18" y2="18"/></svg>;
        const IconReceipt = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17V7"/></svg>;
        const IconScale = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m16 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="m2 16 3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M7 21h10"/><path d="M12 3v18"/><path d="M3 7h2c2 0 5-1 7-2 2 1 5 2 7 2h2"/></svg>;
        const IconWheat = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 22 22 2"/><path d="M3.47 11.53c.43 2.05-.18 4.22-1.47 5.47-.94.94-2.11 1.25-3 1.25.9-.9 1.21-2.06 1.25-3 1.25-1.29 3.42-1.9 5.47-1.47Z"/><path d="M8.47 6.53c.43 2.05-.18 4.22-1.47 5.47-.94.94-2.11 1.25-3 1.25.9-.9 1.21-2.06 1.25-3 1.25-1.29 3.42-1.9 5.47-1.47Z"/><path d="M13.47 1.53c.43 2.05-.18 4.22-1.47 5.47-.94.94-2.11 1.25-3 1.25.9-.9 1.21-2.06 1.25-3 1.25-1.29 3.42-1.9 5.47-1.47Z"/><path d="M11.53 20.53c2.05.43 4.22-.18 5.47-1.47.94-.94 1.25-2.11 1.25-3-.9.9-2.06 1.21-3 1.25-1.29 1.25-1.9 3.42-1.47 5.47Z"/><path d="M16.53 15.53c2.05.43 4.22-.18 5.47-1.47.94-.94 1.25-2.11 1.25-3-.9.9-2.06 1.21-3 1.25-1.29 1.25-1.9 3.42-1.47 5.47Z"/><path d="M21.53 10.53c2.05.43 4.22-.18 5.47-1.47.94-.94 1.25-2.11 1.25-3-.9.9-2.06 1.21-3 1.25-1.29 1.25-1.9 3.42-1.47 5.47Z"/></svg>;
        const IconPackage = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="16.5" x2="7.5" y1="9.4" y2="4.21"/><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" x2="12" y1="22.08" y2="12"/></svg>;
        const IconTrendingDown = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>;
        const IconTrendingUp = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>;
        const IconWallet = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>;
        const IconInfo = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>;
        const IconLightbulb = ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1.3.5 2.6 1.5 3.5.8.8 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>;

        const App = () => {
            // State untuk Input Data
            const [beratGkg, setBeratGkg] = useState(1000); // dalam kg
            const [hargaBeliGkg, setHargaBeliGkg] = useState(7500); // Rp / kg
            const [biayaGiling, setBiayaGiling] = useState(500); // Rp / kg BERAS
            const [hargaJualDedak, setHargaJualDedak] = useState(3000); // Rp / kg
            const [hargaJualBeras, setHargaJualBeras] = useState(12500); // Rp / kg 

            // State untuk Persentase Rendemen
            const [rendemenBeras, setRendemenBeras] = useState(63); // %
            const [rendemenDedak, setRendemenDedak] = useState(5); // %

            // State untuk Hasil Perhitungan
            const [hasil, setHasil] = useState({
                totalBeras: 0,
                totalDedak: 0,
                totalMerangSusut: 0,
                totalModalGabah: 0,
                totalBiayaGiling: 0,
                totalModalKotor: 0,
                pendapatanDedak: 0,
                pendapatanBeras: 0,
                totalOmzet: 0,
                modalBersih: 0,
                hppBeras: 0,
                labaBersih: 0,
            });

            // Fungsi format Rupiah
            const formatRupiah = (angka) => {
                return new Intl.NumberFormat('id-ID', {
                    style: 'currency',
                    currency: 'IDR',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0,
                }).format(angka);
            };

            // Kalkulasi otomatis setiap kali input berubah
            useEffect(() => {
                // 1. Hitung Hasil Fisik
                const beras = beratGkg * (rendemenBeras / 100);
                const dedak = beratGkg * (rendemenDedak / 100);
                const merangSusut = beratGkg - beras - dedak;

                // 2. Hitung Biaya
                const modalGabah = beratGkg * hargaBeliGkg;
                const biayaOperasional = beras * biayaGiling; // Biaya giling dikali BERAS
                const modalKotor = modalGabah + biayaOperasional;
                
                // 3. Hitung Pendapatan
                const jualDedak = dedak * hargaJualDedak;
                const jualBeras = beras * hargaJualBeras;
                const omzet = jualBeras + jualDedak;
                
                // 4. Analisis Akhir
                const bersih = modalKotor - jualDedak; 
                const hpp = beras > 0 ? bersih / beras : 0;
                const laba = omzet - modalKotor;

                setHasil({
                    totalBeras: beras,
                    totalDedak: dedak,
                    totalMerangSusut: merangSusut,
                    totalModalGabah: modalGabah,
                    totalBiayaGiling: biayaOperasional,
                    totalModalKotor: modalKotor,
                    pendapatanDedak: jualDedak,
                    pendapatanBeras: jualBeras,
                    totalOmzet: omzet,
                    modalBersih: bersih,
                    hppBeras: hpp,
                    labaBersih: laba,
                });
            }, [beratGkg, hargaBeliGkg, biayaGiling, hargaJualDedak, hargaJualBeras, rendemenBeras, rendemenDedak]);

            return (
                <div className="min-h-screen p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-5xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <div className="bg-emerald-600 text-white rounded-2xl p-6 shadow-lg flex items-center space-x-4">
                            <div className="bg-white/20 p-3 rounded-full hidden sm:block">
                                <IconCalculator className="w-8 h-8 text-white" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-bold">Kalkulator Penggilingan Padi</h1>
                                <p className="text-emerald-100 text-sm mt-1">
                                    Simulasi HPP, Pendapatan, dan Analisis Laba
                                </p>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            {/* KOLOM KIRI: PANEL INPUT */}
                            <div className="lg:col-span-5 space-y-6">
                                
                                {/* Input Data Keuangan */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h2 className="text-lg font-semibold border-b pb-3 mb-4 flex items-center text-slate-700">
                                        <IconReceipt className="w-5 h-5 mr-2 text-emerald-600" />
                                        Data Input Keuangan
                                    </h2>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-600 mb-1">Berat GKG Input (Kg)</label>
                                            <div className="relative">
                                                <input
                                                    type="number"
                                                    value={beratGkg}
                                                    onChange={(e) => setBeratGkg(Number(e.target.value))}
                                                    className="w-full pl-3 pr-10 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                                />
                                                <span className="absolute right-3 top-2 text-slate-400 text-sm">Kg</span>
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-slate-600 mb-1">Harga Beli GKG (Per Kg)</label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-2 text-slate-400 text-sm">Rp</span>
                                                <input
                                                    type="number"
                                                    value={hargaBeliGkg}
                                                    onChange={(e) => setHargaBeliGkg(Number(e.target.value))}
                                                    className="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                                />
                                            </div>
                                        </div>

                                        <div className="bg-blue-50 p-3 rounded-xl border border-blue-100">
                                            <label className="block text-sm font-semibold text-blue-800 mb-1 flex justify-between">
                                                Biaya Giling / Operasional
                                                <span className="text-xs font-normal bg-blue-200 px-2 py-0.5 rounded-full">Per Kg BERAS</span>
                                            </label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-2 text-blue-600 text-sm font-medium">Rp</span>
                                                <input
                                                    type="number"
                                                    value={biayaGiling}
                                                    onChange={(e) => setBiayaGiling(Number(e.target.value))}
                                                    className="w-full pl-10 pr-3 py-2 border border-blue-300 bg-white rounded-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all font-medium text-blue-900"
                                                />
                                            </div>
                                        </div>

                                        <div className="pt-2 border-t border-slate-100">
                                            <label className="block text-sm font-medium text-amber-600 mb-1">Harga Jual Dedak (Per Kg)</label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-2 text-slate-400 text-sm">Rp</span>
                                                <input
                                                    type="number"
                                                    value={hargaJualDedak}
                                                    onChange={(e) => setHargaJualDedak(Number(e.target.value))}
                                                    className="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-amber-500 outline-none transition-all"
                                                />
                                            </div>
                                        </div>

                                        <div>
                                            <label className="block text-sm font-medium text-emerald-600 mb-1">Harga Jual Beras (Per Kg)</label>
                                            <div className="relative">
                                                <span className="absolute left-3 top-2 text-slate-400 text-sm">Rp</span>
                                                <input
                                                    type="number"
                                                    value={hargaJualBeras}
                                                    onChange={(e) => setHargaJualBeras(Number(e.target.value))}
                                                    className="w-full pl-10 pr-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                                />
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Input Asumsi Rendemen */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h2 className="text-lg font-semibold border-b pb-3 mb-4 flex items-center text-slate-700">
                                        <IconScale className="w-5 h-5 mr-2 text-emerald-600" />
                                        Asumsi Rendemen
                                    </h2>
                                    
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-600 mb-1">Beras (%)</label>
                                            <input
                                                type="number"
                                                value={rendemenBeras}
                                                onChange={(e) => setRendemenBeras(Number(e.target.value))}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-600 mb-1">Dedak (%)</label>
                                            <input
                                                type="number"
                                                value={rendemenDedak}
                                                onChange={(e) => setRendemenDedak(Number(e.target.value))}
                                                className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none transition-all"
                                            />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* KOLOM KANAN: PANEL HASIL */}
                            <div className="lg:col-span-7 space-y-6">
                                
                                {/* Highlight Cards (HPP & Laba) */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    {/* Card HPP */}
                                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 text-center relative overflow-hidden">
                                        <div className="absolute top-0 left-0 w-full h-1 bg-amber-400"></div>
                                        <p className="text-slate-500 font-medium mb-1 text-sm uppercase tracking-wider">HPP Beras</p>
                                        <h2 className="text-3xl font-bold text-slate-800">
                                            {formatRupiah(hasil.hppBeras)}
                                        </h2>
                                        <p className="text-slate-400 text-xs mt-1">Modal bersih / Kg Beras</p>
                                    </div>

                                    {/* Card Laba Bersih */}
                                    <div className={`rounded-2xl shadow-sm border p-5 text-center relative overflow-hidden ${hasil.labaBersih >= 0 ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}`}>
                                        <div className={`absolute top-0 left-0 w-full h-1 ${hasil.labaBersih >= 0 ? 'bg-emerald-500' : 'bg-red-500'}`}></div>
                                        <p className={`font-medium mb-1 text-sm uppercase tracking-wider ${hasil.labaBersih >= 0 ? 'text-emerald-700' : 'text-red-700'}`}>
                                            Estimasi Laba Bersih
                                        </p>
                                        <h2 className={`text-3xl font-bold ${hasil.labaBersih >= 0 ? 'text-emerald-700' : 'text-red-700'}`}>
                                            {formatRupiah(hasil.labaBersih)}
                                        </h2>
                                        <p className={`text-xs mt-1 ${hasil.labaBersih >= 0 ? 'text-emerald-600' : 'text-red-600'}`}>
                                            {hasil.labaBersih >= 0 ? 'Keuntungan' : 'Kerugian'} Total
                                        </p>
                                    </div>
                                </div>

                                {/* Tabel Hasil Fisik */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h3 className="text-slate-700 font-semibold mb-3 flex items-center">
                                        <IconPackage className="w-5 h-5 mr-2 text-emerald-600" />
                                        Hasil Fisik Gilingan
                                    </h3>
                                    <div className="grid grid-cols-3 gap-4 text-center">
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100 relative">
                                            <div className="absolute -top-2 -right-2 bg-blue-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-full">Basis Biaya</div>
                                            <IconWheat className="w-5 h-5 mx-auto text-amber-500 mb-1" />
                                            <p className="text-xs text-slate-500">Beras</p>
                                            <p className="font-semibold text-slate-800">{hasil.totalBeras.toLocaleString('id-ID')} Kg</p>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                            <IconPackage className="w-5 h-5 mx-auto text-amber-700 mb-1" />
                                            <p className="text-xs text-slate-500">Dedak</p>
                                            <p className="font-semibold text-slate-800">{hasil.totalDedak.toLocaleString('id-ID')} Kg</p>
                                        </div>
                                        <div className="bg-slate-50 p-3 rounded-xl border border-slate-100">
                                            <IconTrendingDown className="w-5 h-5 mx-auto text-slate-400 mb-1" />
                                            <p className="text-xs text-slate-500">Merang/Susut</p>
                                            <p className="font-semibold text-slate-800">{hasil.totalMerangSusut.toLocaleString('id-ID')} Kg</p>
                                        </div>
                                    </div>
                                </div>

                                {/* Rincian Keuangan */}
                                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
                                    <h3 className="text-slate-700 font-semibold mb-4 flex items-center">
                                        <IconWallet className="w-5 h-5 mr-2 text-emerald-600" />
                                        Laporan Keuangan
                                    </h3>
                                    
                                    <div className="space-y-4 text-sm">
                                        
                                        {/* Bagian Modal */}
                                        <div>
                                            <p className="font-medium text-slate-500 mb-2 uppercase text-xs">Biaya & Modal</p>
                                            <div className="flex justify-between items-center text-slate-600 mb-1">
                                                <span>Modal Beli Gabah</span>
                                                <span>{formatRupiah(hasil.totalModalGabah)}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-slate-600 mb-2">
                                                <span>Biaya Operasional ({hasil.totalBeras} Kg x {formatRupiah(biayaGiling)})</span>
                                                <span>{formatRupiah(hasil.totalBiayaGiling)}</span>
                                            </div>
                                            <div className="flex justify-between items-center font-semibold text-slate-800 bg-slate-100 p-2 rounded">
                                                <span>Total Modal Kotor</span>
                                                <span>{formatRupiah(hasil.totalModalKotor)}</span>
                                            </div>
                                        </div>

                                        <hr className="border-slate-100" />

                                        {/* Bagian Pendapatan */}
                                        <div>
                                            <p className="font-medium text-slate-500 mb-2 uppercase text-xs">Pendapatan / Omzet</p>
                                            <div className="flex justify-between items-center text-slate-600 mb-1">
                                                <span>Penjualan Beras</span>
                                                <span>{formatRupiah(hasil.pendapatanBeras)}</span>
                                            </div>
                                            <div className="flex justify-between items-center text-slate-600 mb-2">
                                                <span>Penjualan Dedak (+)</span>
                                                <span>{formatRupiah(hasil.pendapatanDedak)}</span>
                                            </div>
                                            <div className="flex justify-between items-center font-semibold text-emerald-800 bg-emerald-50 p-2 rounded">
                                                <span>Total Omzet</span>
                                                <span>{formatRupiah(hasil.totalOmzet)}</span>
                                            </div>
                                        </div>

                                        <hr className="border-slate-100" />

                                        {/* Bagian Laba Bersih */}
                                        <div className="flex justify-between items-center font-bold text-lg pt-2">
                                            <span className="text-slate-800">Laba Bersih</span>
                                            <span className={hasil.labaBersih >= 0 ? "text-emerald-600" : "text-red-600"}>
                                                {formatRupiah(hasil.labaBersih)}
                                            </span>
                                        </div>

                                    </div>
                                </div>

                                {/* Info Box Margin */}
                                <div className="bg-blue-50 text-blue-800 p-4 rounded-xl text-sm border border-blue-100 flex items-start">
                                    <IconInfo className="w-5 h-5 mr-3 flex-shrink-0 mt-0.5" />
                                    <div>
                                        <strong>Margin Laba: </strong> 
                                        Anda mendapatkan keuntungan sekitar <strong>{hasil.totalOmzet > 0 ? ((hasil.labaBersih / hasil.totalOmzet) * 100).toFixed(2) : 0}%</strong> dari total omzet. Pastikan harga jual beras Anda selalu lebih tinggi dari angka <em>HPP Beras</em> agar tidak merugi.
                                    </div>
                                </div>

                            </div>
                        </div>

                        {/* SECTION: ANALISIS MANA YANG LEBIH BERPENGARUH */}
                        <div className="bg-amber-50 rounded-2xl border border-amber-200 p-6 md:p-8 mt-8">
                            <div className="flex items-start">
                                <div className="bg-amber-100 p-3 rounded-full mr-4 flex-shrink-0">
                                    <IconLightbulb className="w-6 h-6 text-amber-600" />
                                </div>
                                <div>
                                    <h3 className="text-lg font-bold text-amber-900 mb-2">
                                        Analisis: Harga Gabah vs Harga Beras, Mana yang Lebih Berpengaruh?
                                    </h3>
                                    <p className="text-amber-800 mb-4 leading-relaxed">
                                        Secara matematis, <strong>Harga Beli Gabah (GKG)</strong> jauh lebih sensitif dan lebih berpengaruh terhadap naik-turunnya keuntungan Anda dibandingkan dengan Harga Jual Beras. Mengapa demikian? <strong>Perbedaan Volume (Bobot)</strong>.
                                    </p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
                                        <div className="bg-white rounded-xl p-4 border border-amber-100 shadow-sm">
                                            <h4 className="font-semibold text-slate-800 flex items-center mb-2">
                                                <IconTrendingDown className="w-4 h-4 mr-2 text-red-500" />
                                                Dampak Perubahan Harga Gabah
                                            </h4>
                                            <p className="text-sm text-slate-600">
                                                Anda membeli gabah dalam volume penuh (100%). Jika harga gabah naik <strong>Rp 100/kg</strong>, maka untuk 1 ton (1.000 kg), modal Anda akan membengkak sebesar <strong>Rp 100.000</strong>.
                                            </p>
                                        </div>
                                        <div className="bg-white rounded-xl p-4 border border-amber-100 shadow-sm">
                                            <h4 className="font-semibold text-slate-800 flex items-center mb-2">
                                                <IconTrendingUp className="w-4 h-4 mr-2 text-emerald-500" />
                                                Dampak Perubahan Harga Beras
                                            </h4>
                                            <p className="text-sm text-slate-600">
                                                Anda hanya menjual beras sekitar {rendemenBeras}% dari gabah awal. Jika harga beras Anda naik <strong>Rp 100/kg</strong>, untuk 1 ton gabah (menghasilkan {hasil.totalBeras} kg beras), pendapatan Anda hanya bertambah <strong>Rp {(100 * (rendemenBeras/100) * 1000).toLocaleString('id-ID')}</strong>.
                                            </p>
                                        </div>
                                    </div>

                                    <div className="mt-5 p-4 bg-amber-100/50 rounded-lg text-amber-900 text-sm border-l-4 border-amber-500">
                                        <strong>💡 Kesimpulan Bisnis:</strong> Bernegosiasi dan menekan <em>harga beli gabah</em> atau mencari gabah dengan <em>kualitas rendemen yang lebih tinggi</em> jauh lebih krusial untuk menyelamatkan laba Anda daripada sekadar mengandalkan kenaikan harga jual beras di pasar yang seringkali sulit dikontrol.
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
